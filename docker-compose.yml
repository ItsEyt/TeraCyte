services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - db-data:/app/data
    environment:
      DB_PATH: /app/data/teracyte.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
